# hypr_edition - configuracion base

monitor=,preferred,auto,1

exec-once = waybar
exec-once = hypr-edition-swaync
exec-once = hypr-edition-swayosd
exec-once = hypr-edition-wallpaper init
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

$terminal = hypr-edition-kitty
$menu = rofi -show drun
$fileManager = thunar

env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = PATH,$HOME/.local/bin:$PATH

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(89b4faee) rgba(a6e3a1ee) 45deg
    col.inactive_border = rgba(313244aa)
    layout = dwindle
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 6
        passes = 2
    }
}

animations {
    enabled = true
    bezier = smooth, 0.05, 0.9, 0.1, 1.0
    animation = windows, 1, 5, smooth
    animation = border, 1, 5, smooth
    animation = fade, 1, 4, smooth
    animation = workspaces, 1, 5, smooth
}

dwindle {
    preserve_split = true
}

bind = SUPER, RETURN, exec, $terminal
bind = SUPER, D, exec, $menu
bind = SUPER, E, exec, $fileManager
bind = SUPER, Q, killactive
bind = SUPER, M, exit
bind = SUPER, F, fullscreen
bind = SUPER, V, togglefloating
bind = SUPER, L, exec, hyprlock
bind = SUPER, N, exec, hypr-edition-notifications -t -sw
bind = SUPER SHIFT, B, exec, hypr-edition-waybar-theme
bind = SUPER SHIFT, Q, exec, hypr-edition-power-menu
bind = SUPER ALT, right, exec, hypr-edition-wallpaper next
bind = SUPER ALT, left, exec, hypr-edition-wallpaper previous

bindel = , XF86AudioRaiseVolume, exec, hypr-edition-volume up
bindel = , XF86AudioLowerVolume, exec, hypr-edition-volume down
bindl = , XF86AudioMute, exec, hypr-edition-volume mute
bindl = , XF86AudioMicMute, exec, hypr-edition-volume mic-mute
bindel = , XF86MonBrightnessUp, exec, hypr-edition-brightness up
bindel = , XF86MonBrightnessDown, exec, hypr-edition-brightness down
bindl = , XF86AudioPlay, exec, hypr-edition-volume play-pause
bindl = , XF86AudioNext, exec, hypr-edition-volume next
bindl = , XF86AudioPrev, exec, hypr-edition-volume prev

bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

bind = , Print, exec, grim -g "$(slurp)" "$HOME/Pictures/screenshot-$(date +%s).png"

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10
