# hypr_edition - kitty
# Tema sobrio, autosuficiente y sin dependencias externas.

font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 11.5

disable_ligatures never
cursor_shape beam
cursor_blink_interval 0.6
cursor_stop_blinking_after 12.0

scrollback_lines 10000
wheel_scroll_multiplier 4.0
touch_scroll_multiplier 1.0

copy_on_select clipboard
strip_trailing_spaces smart
enable_audio_bell no
visual_bell_duration 0.0
confirm_os_window_close 0

window_padding_width 10
window_margin_width 0
background_opacity 0.94
dynamic_background_opacity yes
hide_window_decorations no
remember_window_size yes
initial_window_width 980
initial_window_height 620

tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}: {title}"
active_tab_font_style bold
inactive_tab_font_style normal

# Palette: midnight graphite with cool blue/cyan accents.
foreground #d8dee9
background #101419
selection_foreground #101419
selection_background #8fbcbb

cursor #88c0d0
cursor_text_color #101419
url_color #81a1c1

active_border_color #88c0d0
inactive_border_color #2e3440
bell_border_color #ebcb8b

active_tab_foreground #101419
active_tab_background #88c0d0
inactive_tab_foreground #c0c8d2
inactive_tab_background #1b222b
tab_bar_background #101419

color0 #101419
color1 #bf616a
color2 #a3be8c
color3 #ebcb8b
color4 #81a1c1
color5 #b48ead
color6 #88c0d0
color7 #d8dee9
color8 #4c566a
color9 #d08770
color10 #b7d19a
color11 #f0d399
color12 #8fbcbb
color13 #c099c3
color14 #8fbcbb
color15 #eceff4

map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+w close_tab
map ctrl+shift+left previous_tab
map ctrl+shift+right next_tab
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+plus change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+backspace restore_font_size
